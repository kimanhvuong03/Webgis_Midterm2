<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <title>WebGIS Hanoi - Vương Thị Kim Anh</title>
        
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
        <style>
            html, body, #map { width: 100%; height: 100%; padding: 0; margin: 0; }
            
            /* Khung tiêu đề đúng yêu cầu */
            #header-title {
                position: absolute;
                top: 15px;
                left: 50%;
                transform: translateX(-50%);
                z-index: 1000;
                background: white;
                padding: 12px 25px;
                border: 2px solid #000;
                text-align: center;
                font-family: "Times New Roman", Times, serif;
                box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            }
            
            /* Style cho nhãn tên huyện */
            .district-label {
                background: transparent;
                border: none;
                box-shadow: none;
                font-weight: bold;
                color: black;
                font-size: 11px;
                text-shadow: 1px 1px 2px white;
            }
        </style>
    </head>
    <body>
        <div id="header-title">
            <div style="font-size: 16px; font-weight: bold; text-transform: uppercase;">
                MAP OF PRESCHOOL TEACHER DISTRIBUTION IN HANOI (Publicly available) 2023-2024
            </div>
            <div style="font-size: 14px; margin-top: 5px;">
                2106080018 - Vương Thị Kim Anh
            </div>
        </div>

        <div id="map"></div>

        <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
        
        <script src="layers/gadm41_VNM_2virtual_4.js"></script>

        <script>
        var map = L.map('map', {
            zoomControl:true, maxZoom:28, minZoom:1
        }).fitBounds([[20.5, 105.2],[21.5, 106.2]]);

        // Lớp nền OpenStreetMap
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: 'OpenStreetMap'
        }).addTo(map);

        // Màu sắc phân cấp (Graduated)
        function getColor(d) {
            return d > 1287 ? '#800026' :
                   d > 1034 ? '#BD0026' :
                   d > 755  ? '#E31A1C' :
                   d > 570  ? '#FC4E2A' :
                              '#FFEDA0';
        }

        function styleHanoi(feature) {
            return {
                fillColor: getColor(feature.properties.GiaoVien_Num), // Tên cột số liệu
                weight: 1.5,
                opacity: 1,
                color: 'white',
                fillOpacity: 0.8
            };
        }

        // Hiện nhãn tên huyện (Labels)
        function onEachFeature(feature, layer) {
            if (feature.properties && feature.properties.NAME_2) {
                layer.bindTooltip(feature.properties.NAME_2, {
                    permanent: true,
                    direction: 'center',
                    className: 'district-label'
                });
            }
        }

        // Nạp dữ liệu. Chú ý: json_... phải khớp với tên biến trong file .js của bạn
        var layer_Hanoi = L.geoJson(json_gadm41_VNM_2virtual_4, {
            style: styleHanoi,
            onEachFeature: onEachFeature
        }).addTo(map);

        // Chú giải (Legend) ở góc trên bên phải
        var legend = L.control({position: 'topright'});
        legend.onAdd = function (map) {
            var div = L.DomUtil.create('div', 'info legend');
            var grades = [369, 570, 755, 1034, 1287];
            div.style.background = 'white';
            div.style.padding = '10px';
            div.style.lineHeight = '20px';
            div.style.border = '1px solid black';
            div.innerHTML = '<b>Teacher Count</b><br>';
            for (var i = 0; i < grades.length; i++) {
                div.innerHTML +=
                    '<i style="background:' + getColor(grades[i] + 1) + '; width:15px; height:15px; display:inline-block; vertical-align:middle;"></i> ' +
                    grades[i] + (grades[i + 1] ? '&ndash;' + grades[i + 1] + '<br>' : '+');
            }
            return div;
        };
        legend.addTo(map);
        </script>
    </body>
</html>
