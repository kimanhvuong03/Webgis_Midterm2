<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <title>WebGIS - Vương Thị Kim Anh</title>
        <link rel="stylesheet" href="css/leaflet.css">
        <link rel="stylesheet" href="css/qgis2web.css">
        <link rel="stylesheet" href="css/fontawesome-all.min.css">
        <style>
            html, body, #map { width: 100%; height: 100%; padding: 0; margin: 0; }
            /* Khung tiêu đề theo yêu cầu của thầy */
            #header-title {
                position: absolute;
                top: 15px;
                left: 50%;
                transform: translateX(-50%);
                z-index: 1000;
                background: rgba(255, 255, 255, 0.9);
                padding: 10px 20px;
                border: 2px solid #000;
                border-radius: 4px;
                text-align: center;
                font-family: "Times New Roman", Times, serif;
                min-width: 400px;
            }
            .my-label {
                background: transparent;
                border: none;
                box-shadow: none;
                font-weight: bold;
                color: black;
                text-shadow: 1px 1px 2px white; /* Tạo hiệu ứng white halo cho chữ đen */
            }
        </style>
    </head>
    <body>
        <div id="header-title">
            <div style="font-size: 16px; font-weight: bold; text-transform: uppercase;">
                MAP OF PRESCHOOL TEACHER DISTRIBUTION IN HANOI (Publicly available) 2023-2024
            </div>
            <div style="font-size: 14px; margin-top: 5px;">
                2106080018 - Vương Thị Kim Anh
            </div>
        </div>
        
        <div id="map"></div>

        <script src="js/qgis2web_expressions.js"></script>
        <script src="js/leaflet.js"></script>
        <script src="js/Autolinker.min.js"></script>
        <script src="layers/gadm41_VNM_2_virtual_1.js"></script>

        <script>
        var map = L.map('map', {
            zoomControl:true, maxZoom:28, minZoom:1
        }).fitBounds([[20.53, 105.28],[21.45, 106.10]]);

        // 1. Background layer: OpenStreetMap
        var layer_OSM = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: 'OpenStreetMap'
        }).addTo(map);

        // 2. Hiển thị nhãn tên các đơn vị (Labels)
        function onEachFeature(feature, layer) {
            if (feature.properties && feature.properties.NAME_2) {
                layer.bindTooltip(feature.properties.NAME_2, {
                    permanent: true, // Luôn hiện nhãn
                    direction: 'center',
                    className: 'my-label'
                });
            }
            // Nội dung Popup khi click vào huyện
            var popupContent = '<table>\
                    <tr><td colspan="2"><strong>Huyện:</strong> ' + (feature.properties['NAME_2'] || '') + '</td></tr>\
                    <tr><td colspan="2"><strong>Số giáo viên:</strong> ' + (feature.properties['GiaoVien_Num'] || '0') + '</td></tr>\
                </table>';
            layer.bindPopup(popupContent, {maxHeight: 400});
        }

        // 3. Phân màu (Graduated Symbology) từ Q1
        function getColor(d) {
            return d > 1287 ? '#800026' :
                   d > 1034 ? '#BD0026' :
                   d > 755  ? '#E31A1C' :
                   d > 570  ? '#FC4E2A' :
                              '#FFEDA0';
        }

        function styleHanoi(feature) {
            return {
                fillColor: getColor(feature.properties.GiaoVien_Num), // Tên cột số lượng
                weight: 1.5,
                opacity: 1,
                color: 'white',
                fillOpacity: 0.7
            };
        }

        // 4. Nạp lớp dữ liệu Hà Nội
        var layer_Hanoi = L.geoJson(json_gadm41_VNM_2_virtual_1, {
            style: styleHanoi,
            onEachFeature: onEachFeature
        }).addTo(map);

        // 5. Chú giải (Legend) ở góc trên bên phải
        var legend = L.control({position: 'topright'});
        legend.onAdd = function (map) {
            var div = L.DomUtil.create('div', 'info legend'),
                grades = [369, 570, 755, 1034, 1287],
                labels = ['<strong>Teacher Count</strong>'];
            for (var i = 0; i < grades.length; i++) {
                div.innerHTML +=
                    '<i style="background:' + getColor(grades[i] + 1) + '; width: 18px; height: 18px; display: inline-block; margin-right: 5px; vertical-align: middle;"></i> ' +
                    grades[i] + (grades[i + 1] ? '&ndash;' + grades[i + 1] + '<br>' : '+');
            }
            div.style.padding = '10px';
            div.style.background = 'white';
            div.style.lineHeight = '24px';
            return div;
        };
        legend.addTo(map);
        </script>
    </body>
</html>
